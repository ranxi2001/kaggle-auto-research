competition:
  deadline: '2025-07-25'
  metric: pearson
  metric_direction: maximize
  name: drw-crypto-market-prediction
  type: crypto
  url: https://www.kaggle.com/competitions/drw-crypto-market-prediction
data:
  id_column: ID
  sample_submission: data/raw/sample_submission.csv
  target_column: label
  test: data/raw/test.parquet
  train: data/raw/train.parquet
model:
  cv_folds: 5
  cv_strategy: time_series_split
  primary: lightgbm
  seed: 42
pipeline:
  iteration_limit: 20
  stages:
  - research
  - eda
  - features
  - train
  - evaluate
  - submit
submission:
  auto_submit: false
  best_threshold: 0.001
  max_daily: 2
