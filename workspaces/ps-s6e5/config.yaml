competition:
  deadline: ''
  metric: rmse
  metric_direction: minimize
  name: ps-s6e5
  type: tabular
  url: https://www.kaggle.com/competitions/playground-series-s6e5
data:
  id_column: id
  sample_submission: data/raw/sample_submission.csv
  target_column: target
  test: data/raw/test.csv
  train: data/raw/train.csv
model:
  cv_folds: 5
  cv_strategy: stratified_kfold
  primary: lightgbm
  seed: 42
pipeline:
  iteration_limit: 10
  stages:
  - research
  - eda
  - features
  - train
  - evaluate
  - submit
submission:
  auto_submit: false
  best_threshold: 0.01
  max_daily: 5
